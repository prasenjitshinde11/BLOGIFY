<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blogify — {% block page_title %}Auth{% endblock %}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a;
    --panel:rgba(255,255,255,0.045);
    --panel-border:rgba(255,255,255,0.09);
    --cyan:#00e5ff;
    --violet:#7c4dff;
    --text-primary:#f2f4f8;
    --text-secondary:#9aa3b5;
    --text-muted:#5f6779;
    --danger:#ff5252;
    --success:#00e676;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1000px 520px at 50% -15%,rgba(124,77,255,0.20),transparent 60%),
      radial-gradient(900px 500px at 50% 110%,rgba(0,229,255,0.14),transparent 55%),
      var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    display:flex; align-items:center; justify-content:center;
    padding:40px 20px;
  }
  a{color:inherit;text-decoration:none;}

  /* floating orbs */
  .orb{position:absolute;border-radius:50%;filter:blur(2px);opacity:0.45;animation:float 9s ease-in-out infinite;pointer-events:none;}
  .orb1{width:8px;height:8px;background:var(--cyan);top:15%;left:18%;animation-delay:0s;}
  .orb2{width:5px;height:5px;background:var(--violet);top:72%;left:82%;animation-delay:2s;}
  .orb3{width:6px;height:6px;background:var(--cyan);top:78%;left:12%;animation-delay:4s;}
  .orb4{width:4px;height:4px;background:var(--violet);top:12%;left:85%;animation-delay:1s;}
  @keyframes float{
    0%,100%{transform:translateY(0) translateX(0);opacity:0.35;}
    50%{transform:translateY(-22px) translateX(8px);opacity:0.8;}
  }

  /* Flash messages */
  .flash-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:460px;width:90%;}
  .flash-msg{
    padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;
    backdrop-filter:blur(16px);border:1px solid var(--panel-border);
    animation:slideIn .3s ease; text-align:center;
  }
  .flash-msg.success{background:rgba(0,230,118,0.15);border-color:rgba(0,230,118,0.3);color:#69f0ae;}
  .flash-msg.danger{background:rgba(255,82,82,0.15);border-color:rgba(255,82,82,0.3);color:#ff8a80;}
  .flash-msg.info{background:rgba(0,229,255,0.15);border-color:rgba(0,229,255,0.3);color:#80deea;}
  .flash-msg.warning{background:rgba(255,171,64,0.15);border-color:rgba(255,171,64,0.3);color:#ffd54f;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

  /* -------- Centered form card -------- */
  .auth-card{
    width:100%; max-width:440px;
    background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02));
    border:1px solid var(--panel-border);
    border-radius:24px;
    padding:48px 44px;
    backdrop-filter:blur(20px);
    box-shadow:0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
    position:relative; z-index:2;
    animation: cardIn 0.5s ease;
  }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(16px) scale(0.97);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }

  /* Logo at top of card */
  .auth-logo{
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-weight:800; font-size:20px; margin-bottom:32px;
  }
  .auth-logo .logo-mark{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,var(--cyan),var(--violet));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 26px rgba(0,229,255,0.35);font-size:19px;color:#04121a;
  }

  .tabs{
    display:flex;gap:4px;padding:4px;
    background:var(--panel);border:1px solid var(--panel-border);
    border-radius:14px;margin-bottom:32px;
  }
  .tab{
    flex:1;text-align:center;padding:10px 0;border-radius:10px;
    font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;
    transition:all .25s;
  }
  .tab.active{
    color:#04121a;
    background:linear-gradient(135deg,var(--cyan),var(--violet));
    box-shadow:0 4px 18px rgba(0,229,255,0.25);
  }
  .tab:not(.active):hover{color:var(--text-secondary);}

  .form-title{font-size:24px;font-weight:800;margin:0 0 6px;letter-spacing:-0.01em;text-align:center;}
  .form-sub{font-size:14px;color:var(--text-secondary);margin:0 0 28px;text-align:center;}

  .field{margin-bottom:18px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;}
  .input-wrap{position:relative;}
  .input-wrap i{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:17px;color:var(--text-muted);pointer-events:none;
  }
  .input-wrap i.toggle-eye{left:auto;right:14px;cursor:pointer;pointer-events:auto;}
  .input-wrap input,
  .input-wrap select{
    width:100%;padding:12px 14px 12px 42px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);
    border-radius:12px;color:var(--text-primary);font-size:14px;font-family:inherit;
    transition:border-color .2s,box-shadow .2s;
  }
  .input-wrap input::placeholder{color:var(--text-muted);}
  .input-wrap input:focus,
  .input-wrap select:focus{
    outline:none;border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(0,229,255,0.15);
  }
  .field-error{font-size:12px;color:var(--danger);margin-top:6px;}
  .input-wrap input.is-invalid{border-color:var(--danger);}

  .row-between{display:flex;align-items:center;justify-content:space-between;margin:2px 0 26px;font-size:13px;}
  .remember{display:flex;align-items:center;gap:8px;color:var(--text-secondary);}
  .remember input{accent-color:var(--cyan);width:15px;height:15px;}
  .forgot{color:var(--cyan);font-weight:600;}
  .forgot:hover{text-decoration:underline;}

  .submit-btn{
    width:100%;padding:13px 0;border:none;border-radius:12px;cursor:pointer;
    font-size:14.5px;font-weight:700;color:#04121a;
    background:linear-gradient(135deg,var(--cyan),var(--violet));
    box-shadow:0 6px 24px rgba(0,229,255,0.28);
    margin-bottom:24px;transition:transform .15s,box-shadow .15s;
    font-family:inherit;
  }
  .submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,229,255,0.35);}
  .submit-btn:active{transform:translateY(1px);box-shadow:0 3px 12px rgba(0,229,255,0.2);}

  .divider{display:flex;align-items:center;gap:14px;color:var(--text-muted);font-size:12.5px;margin-bottom:22px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--panel-border);}

  .social-row{display:flex;gap:12px;margin-bottom:28px;}
  .social-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 0;border-radius:12px;border:1px solid var(--panel-border);
    background:rgba(255,255,255,0.03);color:var(--text-secondary);
    font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:border-color .2s,color .2s;
  }
  .social-btn i{font-size:17px;}
  .social-btn:hover{border-color:rgba(255,255,255,0.18);color:var(--text-primary);}

  .switch-line{text-align:center;font-size:13.5px;color:var(--text-secondary);}
  .switch-line a{color:var(--cyan);font-weight:700;}
  .switch-line a:hover{text-decoration:underline;}

  /* Back to home link */
  .back-home{
    position:fixed; top:28px; left:32px; z-index:10;
    display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600; color:var(--text-muted);
    transition: color 0.2s;
  }
  .back-home:hover{color:var(--cyan);}
  .back-home i{font-size:16px;}

  /* Responsive */
  @media(max-width:520px){
    .auth-card{padding:36px 28px;border-radius:20px;}
    .form-title{font-size:21px;}
    body{padding:24px 16px;}
  }
</style>
</head>
<body>

  <!-- Floating orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>

  <!-- Back to home -->
  <a href="{{ url_for('main.home') }}" class="back-home">
    <i class="ti ti-arrow-left"></i> Back to home
  </a>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash-msg {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Centered Auth Card -->
  <div class="auth-card">
    <!-- Logo -->
    <a href="{{ url_for('main.home') }}" class="auth-logo">
      <div class="logo-mark"><i class="ti ti-feather"></i></div>
      Blogify
    </a>

    {% block form_content %}{% endblock %}
  </div>

  <script>
    // Auto-dismiss flash messages
    setTimeout(()=>{
      document.querySelectorAll('.flash-msg').forEach(el=>{
        el.style.transition='opacity .4s';
        el.style.opacity='0';
        setTimeout(()=>el.remove(),400);
      });
    },4000);

    // Password visibility toggle
    document.querySelectorAll('.toggle-eye').forEach(eye=>{
      eye.addEventListener('click',function(){
        const input=this.parentElement.querySelector('input');
        if(input.type==='password'){input.type='text';this.className='ti ti-eye-off toggle-eye';}
        else{input.type='password';this.className='ti ti-eye toggle-eye';}
      });
    });
  </script>
</body>
</html>
